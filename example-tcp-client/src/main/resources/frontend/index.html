<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCP registration demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard">
        <header class="header">
            <h1>TCP registration demo</h1>
            <span class="badge badge-tcp">TCP → discovery</span>
        </header>
        <p class="hint">All discovery traffic uses <strong>TCP</strong>: register, then <code>{"op":"heartbeat","instanceId":"…"}</code> on the same port. UI data comes from <code>./api/status</code> (local HTTP for TestMan proxy only).</p>
        <div class="grid">
            <div class="card"><div class="card-label">Channel</div><div class="card-value" id="channel">--</div></div>
            <div class="card"><div class="card-label">Instance ID</div><div class="card-value" id="instanceId">--</div></div>
            <div class="card"><div class="card-label">Port</div><div class="card-value" id="svcPort">--</div></div>
            <div class="card"><div class="card-label">Uptime</div><div class="card-value" id="uptime">--</div></div>
            <div class="card"><div class="card-label">PID</div><div class="card-value" id="pid">--</div></div>
        </div>
        <div class="footer">Last updated: <span id="lastUpdated">--</span></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
